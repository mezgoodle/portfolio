<div class="col">
    <div class="card shadow-sm">
        <svg class="bd-placeholder-img card-img-top" width="100%" height="225" xmlns="http://www.w3.org/2000/svg" aria-label="Placeholder: {{repo['name']}}" preserveAspectRatio="xMidYMid slice" role="img" focusable="false"><title>{{repo['name']}}</title><rect width="100%" height="100%" fill="#55595c"/><text x="50%" y="50%" fill="#eceeef" dy=".3em">{{repo['name']}}</text></svg>

        <div class="card-body">
            <p class="card-text">{{repo['description']}}</p>
            <div class="d-flex justify-content-between align-items-center">
                <div class="btn-group">
                    <a href="{{repo['html_url']}}" class="pr-1" target="_blank"><button type="button" class="btn btn-sm btn-outline-secondary">View</button></a>
                    <a href="{{repo['html_url']}}/archive/master.zip"><button type="button" class="btn btn-sm btn-outline-secondary">Download</button></a>
                </div>
                <small class="text-muted">{{repo['stargazers_count']}} {% if repo['stargazers_count'] > 1 %}stars{% else %}star{% endif %}</small>
            </div>
        </div>
    </div>
</div>
